<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>True or False</title>
</head>
<body>
    <div class="game">

    <h1>True or False</h1>

    <div class="stats">
        <div>Points: <span id="score">0</span></div>
        <div>Time: <span id="time">60</span></div>
        <div>Series: <span id="combo">0</span></div>
    </div>

    <div id="statement">
        2 + 2 = 5
    </div>

    <div class="buttons">
        <button id="trueBtn">True</button>
        <button id="falseBtn">False</button>
    </div>

    <div id="message"></div>

    <button id="startBtn">Start a game</button>

</div>

<script src="script.js"></script>
</body>
</html>
